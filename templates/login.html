<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login - Explainify</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0a0a0f;
      color:white;
      font-family:'Syne', sans-serif;
    }

    .login-box {
      width:340px;
      padding:40px 30px;
      background:#111;
      border:1px solid #2a2a38;
      border-radius:16px;
      text-align:center;
    }

    .logo {
  background: linear-gradient(90deg,#00e5ff,#a78bfa);

  /* Standard + Webkit */
  background-clip: text;
  -webkit-background-clip: text;

  -webkit-text-fill-color: transparent;

    }

    .subtitle {
      font-size:13px;
      color:#666;
      margin-bottom:20px;
    }

    .google-btn {
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#00e5ff,#7c3aed);
      color:#000;
      font-weight:700;
      cursor:pointer;
      margin-bottom:15px;
    }

    .phone-box {
      background-clip:text;
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .input {
      padding:12px;
      border-radius:10px;
      border:1px solid #2a2a38;
      background:#111;
      color:white;
    }

    .primary-btn {
      padding:12px;
      border:none;
      border-radius:10px;
      background:#00e5ff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    .secondary-btn {
      padding:10px;
      border:none;
      border-radius:10px;
      background:#222;
      color:#aaa;
      cursor:pointer;
    }

    .otp-section {
      display:none;
      flex-direction:column;
      gap:10px;
    }
  </style>
</head>

<body>

<div class="login-box">
  <div class="logo">⚡ Explainify</div>
  <div class="subtitle">Login to continue</div>

  <button class="google-btn" onclick="googleLogin()">Continue with Google</button>

  <div class="phone-box">
    <input id="phone" placeholder="+91XXXXXXXXXX" class="input"/>
    <div id="recaptcha-container"></div>
    <button class="primary-btn" onclick="sendOTP()">Send OTP</button>

    <div class="otp-section" id="otpSection">
      <input id="otp" placeholder="Enter OTP" class="input"/>
      <button class="secondary-btn" onclick="verifyOTP()">Verify OTP</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAM8nqP35YuOIpjc1enOQDX4FVWxUOutCU",
  authDomain: "explainify-ai.firebaseapp.com",
  projectId: "explainify-ai",
  storageBucket: "explainify-ai.firebasestorage.app",
  messagingSenderId: "1007832268787",
  appId: "1:1007832268787:web:0ae0ee7a0f82b5d802dc86"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let confirmationResult;

/* Setup reCAPTCHA */
window.onload = function () {
  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
    'recaptcha-container',
    { size: 'normal' }
  );
};

/* Google Login */
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  const isMobile = /Android|iPhone/i.test(navigator.userAgent);

  if (isMobile) {
    auth.signInWithRedirect(provider);
  } else {
    auth.signInWithPopup(provider)
      .then(() => window.location.replace("/"))
      .catch(err => alert(err.message));
  }
}

/* Handle redirect */
auth.getRedirectResult().then(result => {
  if (result.user) {
    window.location.replace("/");
  }
});

/* Send OTP */
function sendOTP() {
  const phone = document.getElementById("phone").value;

  if (!phone.startsWith("+")) {
    alert("Use +91XXXXXXXXXX format");
    return;
  }

  auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
    .then(result => {
      confirmationResult = result;
      alert("OTP sent");
      document.getElementById("otpSection").style.display = "flex";
    })
    .catch(err => alert(err.message));
}

/* Verify OTP */
function verifyOTP() {
  const code = document.getElementById("otp").value;

  confirmationResult.confirm(code)
    .then(() => window.location.replace("/"))
    .catch(() => alert("Invalid OTP"));
}
</script>

</body>
</html>
