<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login - Explainify</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0a0a0f;
      color:white;
      font-family:'Syne', sans-serif;
      overflow:hidden;
    }

    body::before {
      content:'';
      position:fixed;
      width:500px;
      height:500px;
      background:radial-gradient(circle, rgba(0,229,255,0.15), transparent);
      top:-100px;
      left:-100px;
    }

    body::after {
      content:'';
      position:fixed;
      width:500px;
      height:500px;
      background:radial-gradient(circle, rgba(124,58,237,0.15), transparent);
      bottom:-100px;
      right:-100px;
    }

    .login-box {
      width:340px;
      padding:40px 30px;
      background:rgba(17,17,24,0.9);
      border:1px solid #2a2a38;
      border-radius:16px;
      text-align:center;
      backdrop-filter:blur(12px);
      box-shadow:0 0 40px rgba(0,229,255,0.08);
    }

    .logo {
      font-size:22px;
      font-weight:800;
      margin-bottom:10px;
      background:linear-gradient(90deg,#00e5ff,#a78bfa);
      background-clip:text;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle {
      font-size:13px;
      color:#666680;
      margin-bottom:30px;
    }

    .google-btn {
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#00e5ff,#7c3aed);
      color:#000;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      transition:0.2s;
    }

    .google-btn:hover {
      transform:scale(1.03);
      box-shadow:0 0 20px rgba(0,229,255,0.4);
    }

    .footer {
      margin-top:20px;
      font-size:11px;
      color:#666680;
    }
    .open-btn {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #2a2a38;
  background:#222;
  color:#aaa;
  font-size:13px;
  cursor:pointer;
}

.notice {
  font-size:12px;
  color:#facc15;
  background:rgba(250,204,21,0.08);
  border:1px solid rgba(250,204,21,0.2);
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
  line-height:1.5;
}

  </style>
</head>

<body>

<div class="login-box">
  <div class="logo">⚡ Explainify</div>
  <div class="subtitle">Continue with your Google account</div>

  <button class="google-btn" onclick="googleLogin()">
    Continue with Google
  </button>
<button class="open-btn" onclick="openBrowser()">
  Open in Browser
</button>
<div class="notice">
  ⚠️ This login only works in Chrome or Safari.<br>
  If you opened this in Instagram or WhatsApp,<br>
  please tap below and open in browser.
</div>
  <div class="footer">Secure login powered by Firebase</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAM8nqP35YuOIpjc1enOQDX4FVWxUOutCU",
  authDomain: "explainify-ai.firebaseapp.com",
  projectId: "explainify-ai",
  storageBucket: "explainify-ai.firebasestorage.app",
  messagingSenderId: "1007832268787",
  appId: "1:1007832268787:web:0ae0ee7a0f82b5d802dc86"
};
function openBrowser() {
  const url = window.location.href;

  // Try to force external browser
  window.open(url, "_blank");
}
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* Hide until ready */
document.body.style.display = "none";

/* Auth state */
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.replace("/");
  } else {
    document.body.style.display = "flex";
  }
});

/* Google login (mobile + desktop safe) */
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  const ua = navigator.userAgent;

  const isInApp =
    /FBAN|FBAV|Instagram|Line|WhatsApp|Messenger/i.test(ua);

  const isMobile =
    /Android|iPhone|iPad|iPod/i.test(ua);

  if (isInApp) {
    alert("Please open this site in Chrome or Safari to login.");
    return;
  }

  if (isMobile) {
    auth.signInWithRedirect(provider);
  } else {
    auth.signInWithPopup(provider)
      .then(() => window.location.replace("/"))
      .catch(err => alert(err.message));
  }
}
</script>

</body>
</html>
